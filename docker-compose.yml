services:
  php:
    build: ./docker/php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: dev
      APP_VERSION: dev
      DB_HOST: mysql
      DB_NAME: humanome
      DB_USER: humanome
      DB_PASSWORD: humanome_dev
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: humanome
      MYSQL_USER: humanome
      MYSQL_PASSWORD: humanome_dev
      MYSQL_ROOT_PASSWORD: root_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_dev"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql-data:
