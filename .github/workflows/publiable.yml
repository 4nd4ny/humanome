name: publiable

# CI de publication (D10). À chaque push/PR :
#  - `check-publiable` : garde-fou (aucun secret / .env / gabarit Twin9 / chemin
#    local / identifiant OVH ne doit entrer dans le miroir public) ;
#  - `engine` : suite du moteur (vecteurs figés versionnés, autonome).
#
# Volontairement PAS dans cette CI :
#  - la suite FRONT : ses fixtures importent des données GÉNÉRÉES
#    (web/public/data/**, gitignorées, dérivées d'assets-existants via une
#    chaîne convert/generate multi-étapes) — elle tourne en local ;
#  - la suite PHP : nécessite Docker (php:8.2) + MySQL — elle tourne en local
#    (`docker compose run --rm php composer test`).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check-publiable:
    name: Résidus non publiables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Garde-fou de publication
        run: node scripts/check-publiable.mjs

  engine:
    name: Tests moteur
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: engine
      - run: npm test
        working-directory: engine
